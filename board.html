<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Things in Rings — Board</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23222'/><text x='50' y='68' font-family='Georgia,serif' font-size='60' font-style='italic' fill='%23f5f5f5' text-anchor='middle'>e</text></svg>">
    <script>document.documentElement.dataset.theme = localStorage.getItem('theme') || 'light';</script>
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="board-page">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <div class="container">
        <div class="board-area" id="boardArea">
            <div class="venn-circle circle1" id="circle1"></div>
            <div class="venn-circle circle2" id="circle2"></div>
            <div class="venn-circle circle3" id="circle3"></div>
            <div class="region-label label-1">attribute</div>
            <div class="region-label label-2">context</div>
            <div class="region-label label-3">word</div>
            <div class="region-label label-none">None</div>
        </div>
        
        <div class="bottom-area">
            <div class="hand-area" id="handArea"></div>
            <button class="draw-button" id="drawButton">Draw</button>
        </div>
        <div class="nsfw-toggle" id="nsfwToggle" data-state="off">
            <span class="nsfw-label">NSFW</span>
            <button class="nsfw-option active" data-value="off">Off</button>
            <button class="nsfw-option" data-value="mixed">Mixed</button>
            <button class="nsfw-option" data-value="only">Only</button>
        </div>
    </div>

    <script>
        const wordList = ['puppy', 'basketball', 'car', 'tree', 'house',
         'novel', 'sun', 'moon', 'star', 'universe', 'saturn','fish', 'birdcage',
         'flower', 'apple', 'chair', 'table', 'bed', 'door', 'window',
         'shoe', 'hat', 'shirt', 'cup', 'spoon', 'leaf', 
         'pencil', 'shoebox', 'office', 'key', 'clock', 'phone', 'toy',
         'bike', 'bus', 'train', 'plane', 'boat', 'mushroom', 'air',
         'pizza', 'ice', 'cookie', 'pie', 'orange',
         'bear', 'lion', 'frog', 'duck', 'cow', 'ant', 'horse', 'bacterium',
         'cloud', 'raindrop', 'snowflake', 'firework', 'waterfall', 'rock', 
         'grass', 'beach', 'park', 'school', 'store', 'boardgame', 'glove',
         'pool', 'bat', 'aardvark', 'xylophone', 'violin', 'doorbell',
         'monster', 'robot', 'castle', 'crown', 'forest', 'oven',
         'attic', 'egg', 'nun', 'flag', 'airplane', 'mountain', 'eye',
         'umbrella', 'underwear', 'toaster', 'diamond', 'seashell', 'button',
         'lighthouse', 'comb', 'earring', 'camera', 'brain', 'heart',
         'owl', 'pea', 'campfire', 'yoyo', 'milkshake', 'airstrip',
         'telephone', 'towel', 'mirror', 'museum', 'dress', 'oboe', 'coin',
         'skyscraper', 'kitten', 'broom', 'igloo', 'coral', 'skimask',
         'potato', 'cigar', 'laptop', 'statue', 'bean', 'bomb', 'llama',
         'queen', 'rocket', 'asteroid', 'spatula', 'pan', 'rake', 'scissors',
         'lawnmower', 'hose', 'painting', 'mask', 'fossil', 'skull', 'scuba',
         'needle', 'anthill', 'whip', 'fork', 'pistol', 'rifle', 'tissue',
         'notebook', 'toilet', 'flour', 'chocolate', 'teabag', 'potpourri',
         'candle', 'spectacles', 'trousers', 'microscope', 'ether',
         'helicopter', 'paint', 'cinema', 'river', 'kangaroo',
         'cemetery', 'refrigerator', 'hippopotamus', 'bookshelf', 'abacus',
         'zeppelin', 'balloon', 'airbag', 'ear', 'nose', 'ukulele',
         'stamp', 'truck', 'elevator', 'bathroom', 'forklift', 'corkscrew',
         'watch', 'clocktower', 'sea', 'tea', 'coffee', 'bee', 'labyrinth',
         'fire', 'ape', 'orangutan', 'apron', 'stool', 'strap', 'satellite',
         'spaceship', 'hospital', 'hotel', 'wheel',  'archipelago',
         'salt', 'typewriter', 'printer', 'calculator', 'lamp', 'tractor',
         'seesaw', 'bandage', 'factory', 'glitter', 'flask', 'pineapple',
         'spring', 'bone', 'battleship', 'kite', 'eagle',
         'pterodactyl', 'cliff', 'internet', 'soldier', 'candelabra', 'beret',
         'easel', 'elastic', 'eraser', 'ottoman', 'settee', 'frisbee',
         'shadow', 'island', 'kiwi', 'mosque', 'mosquito', 'ginger', 'lemon',
         'pixie', 'elf', 'smartphone', 'pepperspray', 'jacket',
         'hair', 'sheep', 'flea', 'shuttlecock',
         'surfboard', 'trampoline', 'skateboard', 'helmet', 'whistle', 'goalpost', 
         'puppet', 'marionette', 'kaleidoscope', 'boomerang', 
         'telescope', 'thermometer', 'magnet', 'pendulum', 'prism', 'beaker',
         'chisel', 'palette', 'crayon', 'paintbrush', 'origami',
         'dragon', 'unicorn', 'mermaid', 'phoenix', 'centaur', 'gargoyle',
         'hammock', 'chandelier', 'wardrobe', 'bookcase', 'chessboard',
         'necklace', 'bracelet', 'monocle', 'tiara',
         'tornado', 'lightning', 'avalanche', 'rainbow', 'tsunami',
         'stapler', 'paperclip', 'envelope', 'clipboard',
         'caterpillar', 'hourglass', 'tambourine', 'periscope', 
         'guillotine', 'stethoscope', 'parachute', 'scarecrow', 'porcupine',
         'dynamite', 'jackhammer', 'saxophone', 'accordion',
        ];
        
        const nsfwWordList = [
         'fart', 'poop', 'semen', 'queef', 'missionary', 'shart',
         'shit', 'arsehole', 'motherfucker', 'pee', 'butt', 'penis',
         'vagina', 'bitch', 'blowjob', 'handjob', 'rimjob', 'boobs',
         'cocaine', 'lesbian', 'shrooms', 'weed', 'jailbait', 'sex',
         'bollocks', 'orgy', 'orgasm', 'porno', 'whore', 'viagra',
         'masturbator', 'dildo', 'fleshlight', 'douchebag', 'pimps',
         'chlamydia', 'herpes', 'gonorrhea', 'foetus', 'anus',
         'gigolo', 'doobie', 'condom', 'incel', 'panty', 'sodomiser',
         'bastard', 'cocksucker', 'fellatio', 'pubes', 'tit', 'piss',
         'kamasutra', 'powerbottom', 
        ];
        let usedWords = [];
        let draggedElement = null;
        let isDragging = false;
        let offset = { x: 0, y: 0 };
        let shiftPressed = false;
        let circleBeingDragged = null;

        // Initialize hand with 5 cards
        function initializeHand() {
            const handArea = document.getElementById('handArea');
            handArea.innerHTML = '';
            
            for (let i = 0; i < 5; i++) {
                createWordCard();
            }
        }

        function getActiveWordList() {
            const state = document.getElementById('nsfwToggle').dataset.state;
            if (state === 'only') return nsfwWordList;
            if (state === 'mixed') return wordList.concat(nsfwWordList);
            return wordList;
        }

        function getRandomWord() {
            const pool = getActiveWordList();
            const availableWords = pool.filter(word => !usedWords.includes(word));
            if (availableWords.length === 0) {
                usedWords = [];
                return pool[Math.floor(Math.random() * pool.length)];
            }
            const word = availableWords[Math.floor(Math.random() * availableWords.length)];
            usedWords.push(word);
            return word;
        }

        function createWordCard() {
            const handArea = document.getElementById('handArea');
            const card = document.createElement('div');
            card.className = 'word-card';
            card.textContent = getRandomWord();
            card.draggable = false;
            
            // Add event listeners for dragging
            card.addEventListener('mousedown', startDrag);
            card.addEventListener('touchstart', startDrag, { passive: false });
            
            handArea.appendChild(card);
            return card;
        }

        function getPointerPos(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            if (e.changedTouches && e.changedTouches.length > 0) {
                return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function startDrag(e) {
            e.preventDefault();
            draggedElement = e.target;
            isDragging = true;

            const pos = getPointerPos(e);
            const rect = draggedElement.getBoundingClientRect();
            offset.x = pos.x - rect.left;
            offset.y = pos.y - rect.top;

            draggedElement.classList.add('dragging');

            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', stopDrag);
            document.addEventListener('touchmove', drag, { passive: false });
            document.addEventListener('touchend', stopDrag);
        }

        function drag(e) {
            if (!isDragging || !draggedElement) return;

            e.preventDefault();

            const pos = getPointerPos(e);
            const x = pos.x - offset.x;
            const y = pos.y - offset.y;

            draggedElement.style.position = 'fixed';
            draggedElement.style.left = x + 'px';
            draggedElement.style.top = y + 'px';
            draggedElement.style.zIndex = '9999';
        }

        function stopDrag(e) {
            if (!isDragging || !draggedElement) return;

            isDragging = false;
            draggedElement.classList.remove('dragging');

            const pos = getPointerPos(e);
            const boardArea = document.getElementById('boardArea');
            const boardRect = boardArea.getBoundingClientRect();
            const cardRect = draggedElement.getBoundingClientRect();

            // Check if card is dropped on board area
            if (cardRect.top < boardRect.bottom - 50) {
                // Move to board area
                draggedElement.style.position = 'absolute';
                draggedElement.style.left = (pos.x - boardRect.left - offset.x) + 'px';
                draggedElement.style.top = (pos.y - boardRect.top - offset.y) + 'px';
                draggedElement.classList.add('floating-card');
                boardArea.appendChild(draggedElement);

                reorganizeHand();
            } else {
                // Return to hand or keep in current position
                if (!draggedElement.classList.contains('floating-card')) {
                    draggedElement.style.position = '';
                    draggedElement.style.left = '';
                    draggedElement.style.top = '';
                    draggedElement.style.zIndex = '';
                }
            }

            draggedElement = null;
            document.removeEventListener('mousemove', drag);
            document.removeEventListener('mouseup', stopDrag);
            document.removeEventListener('touchmove', drag);
            document.removeEventListener('touchend', stopDrag);
        }

        function reorganizeHand() {
            const handArea = document.getElementById('handArea');
            const cardsInHand = Array.from(handArea.querySelectorAll('.word-card'));
            
            cardsInHand.forEach(card => {
                card.style.position = '';
                card.style.left = '';
                card.style.top = '';
                card.style.zIndex = '';
            });
        }

        // Circle and label dragging functionality
        function startCircleDrag(e) {
            if (!shiftPressed) return;

            e.preventDefault();
            circleBeingDragged = e.target;

            const pos = getPointerPos(e);
            const rect = circleBeingDragged.getBoundingClientRect();

            offset.x = pos.x - rect.left;
            offset.y = pos.y - rect.top;

            document.addEventListener('mousemove', dragCircle);
            document.addEventListener('mouseup', stopCircleDrag);
            document.addEventListener('touchmove', dragCircle, { passive: false });
            document.addEventListener('touchend', stopCircleDrag);
        }

        function startLabelDrag(e) {
            if (!shiftPressed) return;

            e.preventDefault();
            circleBeingDragged = e.target;

            const pos = getPointerPos(e);
            const rect = circleBeingDragged.getBoundingClientRect();

            offset.x = pos.x - rect.left;
            offset.y = pos.y - rect.top;

            document.addEventListener('mousemove', dragLabel);
            document.addEventListener('mouseup', stopCircleDrag);
            document.addEventListener('touchmove', dragLabel, { passive: false });
            document.addEventListener('touchend', stopCircleDrag);
        }

        function dragCircle(e) {
            if (!circleBeingDragged || !shiftPressed) return;

            e.preventDefault();

            const pos = getPointerPos(e);
            const boardRect = document.getElementById('boardArea').getBoundingClientRect();
            const x = pos.x - boardRect.left - offset.x;
            const y = pos.y - boardRect.top - offset.y;

            circleBeingDragged.style.left = Math.max(0, Math.min(x, boardRect.width - circleBeingDragged.offsetWidth)) + 'px';
            circleBeingDragged.style.top = Math.max(0, Math.min(y, boardRect.height - circleBeingDragged.offsetHeight)) + 'px';
        }

        function dragLabel(e) {
            if (!circleBeingDragged || !shiftPressed) return;

            e.preventDefault();

            const pos = getPointerPos(e);
            const boardRect = document.getElementById('boardArea').getBoundingClientRect();
            const x = pos.x - boardRect.left - offset.x;
            const y = pos.y - boardRect.top - offset.y;

            circleBeingDragged.style.left = Math.max(0, Math.min(x, boardRect.width - circleBeingDragged.offsetWidth)) + 'px';
            circleBeingDragged.style.top = Math.max(0, Math.min(y, boardRect.height - circleBeingDragged.offsetHeight)) + 'px';
        }

        function stopCircleDrag() {
            circleBeingDragged = null;
            document.removeEventListener('mousemove', dragCircle);
            document.removeEventListener('mouseup', stopCircleDrag);
            document.removeEventListener('touchmove', dragCircle);
            document.removeEventListener('touchend', stopCircleDrag);
        }

        // Draw button functionality
        function drawNewCards() {
            const handArea = document.getElementById('handArea');
            const currentCards = handArea.querySelectorAll('.word-card').length;
            const cardsNeeded = 5 - currentCards;
            
            for (let i = 0; i < cardsNeeded; i++) {
                createWordCard();
            }

            if (cardsNeeded <= 0) {
                createWordCard();
            }
            
            reorganizeHand();
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Shift') {
                shiftPressed = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'Shift') {
                shiftPressed = false;
            }
        });

        // Add circle and label drag listeners
        document.getElementById('circle1').addEventListener('mousedown', startCircleDrag);
        document.getElementById('circle2').addEventListener('mousedown', startCircleDrag);
        document.getElementById('circle3').addEventListener('mousedown', startCircleDrag);
        document.getElementById('circle1').addEventListener('touchstart', startCircleDrag, { passive: false });
        document.getElementById('circle2').addEventListener('touchstart', startCircleDrag, { passive: false });
        document.getElementById('circle3').addEventListener('touchstart', startCircleDrag, { passive: false });

        // Add label drag listeners
        document.querySelectorAll('.region-label').forEach(label => {
            label.addEventListener('mousedown', startLabelDrag);
            label.addEventListener('touchstart', startLabelDrag, { passive: false });
        });

        // Draw button listener
        document.getElementById('drawButton').addEventListener('click', drawNewCards);

        // NSFW toggle listener
        document.querySelectorAll('.nsfw-option').forEach(btn => {
            btn.addEventListener('click', () => {
                const toggle = document.getElementById('nsfwToggle');
                toggle.dataset.state = btn.dataset.value;
                document.querySelectorAll('.nsfw-option').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // Initialize the interface
        initializeHand();
    </script>
    <script src="./theme.js"></script>
    <script data-goatcounter="https://cakester.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</body>
